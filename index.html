<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vending Machine</title>
<style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
    #start-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #004a99;
        color: white;
        text-align: center;
        cursor: pointer;
        flex-direction: column;
    }
    .callout {
        position: relative;
        background: rgba(255,255,255,0.2);
        padding: 15px 20px;
        border-radius: 20px;
        margin: 20px 0;
    }
    .callout::after {
        content: '';
        position: absolute;
        bottom: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 15px solid transparent;
        border-right: 15px solid transparent;
        border-top: 15px solid rgba(255,255,255,0.2);
    }
    #start-btn {
        background: #ffcc00;
        color: black;
        border: 4px solid #fff;
        width: 100px;
        height: 100px;
        font-size: 18px;
        border-radius: 50%;
        cursor: pointer;
        margin: 20px 0;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .hand-icon {
        font-size: 48px;
        margin-top: 10px;
    }
    #main-ui { display: none; padding: 20px; text-align: center; }
    #checkout-ui { display: none; padding: 20px; text-align: center; position: relative; min-height: 100vh; }
    #scan-ui { display: none; padding: 20px; text-align: center; }
    #display {
        font-size: 48px;
        margin: 20px;
        background: #eee;
        padding: 10px;
        border-radius: 5px;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 300px;
        margin: 20px auto;
    }
    .key, #clear, #cancel, #checkout-cancel, #continue-shopping, #checkout-btn, #scan-complete, #add-item, #proceed-checkout {
        padding: 20px;
        font-size: 24px;
        background: #ddd;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    #clear { background: #ffcc00; }
    #cancel, #checkout-cancel { background: #f00; color: white; margin-top: 20px; }
    #continue-shopping { background: #0f0; color: white; }
    #checkout-btn, #scan-complete, #proceed-checkout { background: #00f; color: white; }
    #add-item { background: #ffa500; }
    #checkout-buttons {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
    }
    .item-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 10px 0;
    }
    .item-controls button {
        padding: 5px 10px;
        font-size: 20px;
        background: #ddd;
        border: none;
        border-radius: 3px;
        cursor: pointer;
    }
    .remove-btn {
        background: #f00;
        color: white;
    }
    .blink { animation: blinker 1.5s linear infinite; }
    @keyframes blinker { 50% { opacity: 0; } }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
    <h1>Personal Protective Equipment</h1>
    <div class="callout blink">Touch to Start</div>
    <button id="start-btn" onclick="startApp()">Start</button>
    <div class="hand-icon">👆</div>
</div>

<!-- Main UI (Hidden Initially) -->
<div id="main-ui">
    <h2>Select Your Item</h2>
    <div id="display">0</div>
    <div id="keypad">
        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button id="clear">Clear</button>
        <button class="key" data-value="0">0</button>
        <button id="add-item" style="display: none;">Add Item</button>
    </div>
    <button id="proceed-checkout">Proceed to Checkout</button>
    <button id="cancel">Cancel</button>
</div>

<!-- Checkout UI (Hidden Initially) -->
<div id="checkout-ui">
    <h2>Checkout</h2>
    <div id="cart-list"></div>
    <div id="checkout-buttons">
        <button id="checkout-cancel">Cancel</button>
        <button id="continue-shopping">Continue Shopping</button>
        <button id="checkout-btn">Checkout</button>
    </div>
</div>

<!-- Scan UI (Hidden Initially) -->
<div id="scan-ui">
    <h2>Scan Your Badge</h2>
    <p>Scan your badge to complete checkout</p>
    <div class="scanner">📱</div>
    <button id="scan-complete">Scan Complete</button>
</div>

<script>
    let selectedItem = '';
    let cart = [];
    const display = document.getElementById('display');
    const cartList = document.getElementById('cart-list');
    const addItemBtn = document.getElementById('add-item');

    function startApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
    }

    function resetSelection() {
        selectedItem = '';
        display.textContent = '0';
        addItemBtn.style.display = 'none';
    }

    function updateCartDisplay() {
        cartList.innerHTML = '';
        cart.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item-controls';
            
            const span = document.createElement('span');
            span.textContent = `Item ${index + 1}: ${item.code} (Qty: ${item.qty})`;
            span.style.fontSize = '32px';
            span.style.flexGrow = '1';
            
            const minusBtn = document.createElement('button');
            minusBtn.textContent = '-';
            minusBtn.onclick = () => {
                if (item.qty > 1) {
                    item.qty--;
                } else {
                    cart.splice(index, 1);
                }
                updateCartDisplay();
            };
            
            const plusBtn = document.createElement('button');
            plusBtn.textContent = '+';
            plusBtn.onclick = () => {
                item.qty++;
                updateCartDisplay();
            };
            
            const removeBtn = document.createElement('button');
            removeBtn.textContent = 'X';
            removeBtn.className = 'remove-btn';
            removeBtn.onclick = () => {
                cart.splice(index, 1);
                updateCartDisplay();
            };
            
            div.appendChild(span);
            div.appendChild(minusBtn);
            div.appendChild(plusBtn);
            div.appendChild(removeBtn);
            cartList.appendChild(div);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.key').forEach(btn => {
            btn.addEventListener('click', () => {
                if (selectedItem.length < 3) {
                    selectedItem += btn.dataset.value;
                    display.textContent = selectedItem;
                    if (selectedItem.length === 3) {
                        addItemBtn.style.display = 'inline-block';
                    }
                }
            });
        });

        document.getElementById('clear').addEventListener('click', () => {
            resetSelection();
        });

        document.getElementById('add-item').addEventListener('click', () => {
            const existing = cart.find(item => item.code === selectedItem);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({code: selectedItem, qty: 1});
            }
            resetSelection();
        });

        document.getElementById('proceed-checkout').addEventListener('click', () => {
            if (cart.length > 0) {
                updateCartDisplay();
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('checkout-ui').style.display = 'block';
            }
        });

        document.getElementById('cancel').addEventListener('click', () => {
            cart = [];
            resetSelection();
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        });

        document.getElementById('checkout-cancel').addEventListener('click', () => {
            cart = [];
            resetSelection();
            document.getElementById('checkout-ui').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        });

        document.getElementById('continue-shopping').addEventListener('click', () => {
            resetSelection();
            document.getElementById('checkout-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        });

        document.getElementById('checkout-btn').addEventListener('click', () => {
            document.getElementById('checkout-ui').style.display = 'none';
            document.getElementById('scan-ui').style.display = 'block';
        });

        document.getElementById('scan-complete').addEventListener('click', () => {
            const items = cart.map(item => `${item.code} (x${item.qty})`).join(', ');
            alert('Checkout completed for items: ' + items);
            cart = [];
            resetSelection();
            document.getElementById('scan-ui').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        });
    });
</script>

</body>
</html>
